name: Deploy Bot to Cloud Run

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  SERVICE_NAME: ${{ vars.CLOUD_RUN_SERVICE || secrets.CLOUD_RUN_SERVICE || 'ws-store-official-bot' }}
  REGION: ${{ vars.GCP_REGION || secrets.GCP_REGION || 'asia-southeast2' }}
  ARTIFACT_REPOSITORY: ${{ vars.ARTIFACT_REPOSITORY || secrets.ARTIFACT_REPOSITORY || 'ws-store' }}
  GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID || secrets.GCP_PROJECT_ID }}

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install locked dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Check JavaScript syntax
        run: find src test -type f -name '*.js' -exec node --check {} \;

  deploy:
    needs: validate
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER || secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_DEPLOY_SERVICE_ACCOUNT || secrets.GCP_DEPLOY_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v3

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker "${REGION}-docker.pkg.dev" --quiet

      - name: Build image
        run: |
          IMAGE="${REGION}-docker.pkg.dev/${GCP_PROJECT_ID}/${ARTIFACT_REPOSITORY}/${SERVICE_NAME}:${GITHUB_SHA}"
          docker build -t "${IMAGE}" .
          echo "IMAGE=${IMAGE}" >> "${GITHUB_ENV}"

      - name: Push image
        run: docker push "${IMAGE}"

      - name: Deploy Cloud Run service
        id: deploy
        uses: google-github-actions/deploy-cloudrun@v3
        with:
          service: ${{ env.SERVICE_NAME }}
          region: ${{ env.REGION }}
          image: ${{ env.IMAGE }}
          env_vars: |-
            DISCORD_CLIENT_ID=${{ vars.DISCORD_CLIENT_ID || secrets.DISCORD_CLIENT_ID }}
            DISCORD_GUILD_ID=${{ vars.DISCORD_GUILD_ID || secrets.DISCORD_GUILD_ID }}
            OWNER_DISCORD_ID=${{ vars.OWNER_DISCORD_ID || secrets.OWNER_DISCORD_ID }}
            STORE_NAME=WS Store Official
            STORE_TIMEZONE=Asia/Jakarta
            STORE_TIMEZONE_LABEL=WIB
            STORE_OPEN_HOUR=10
            STORE_CLOSE_HOUR=22
            QRIS_IMAGE_PATH=assets/qris-ws-store.png
            SUPABASE_URL=${{ vars.SUPABASE_URL || secrets.SUPABASE_URL }}
          secrets: |-
            DISCORD_TOKEN=discord-token:latest
            SUPABASE_SECRET_KEY=supabase-secret-key:latest
          flags: >-
            --min-instances=1
            --max-instances=1
            --no-cpu-throttling
            --no-allow-unauthenticated
            --memory=512Mi
            --cpu=1
            --port=8080
            --service-account=${{ vars.GCP_DEPLOY_SERVICE_ACCOUNT || secrets.GCP_DEPLOY_SERVICE_ACCOUNT }}

      - name: Show service URL
        run: echo "${{ steps.deploy.outputs.url }}"
